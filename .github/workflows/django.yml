name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      FRONTEND_URL: "https://knoledgr.com"
      ALLOWED_HOSTS: "knoledgr.com,www.knoledgr.com,.vercel.app,localhost,127.0.0.1"
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOWED_ORIGINS: "https://knoledgr.com,https://www.knoledgr.com,https://recall-three-plum.vercel.app"
      CSRF_TRUSTED_ORIGINS: "https://knoledgr.com,https://www.knoledgr.com,https://recall-three-plum.vercel.app"
      SECURITY_PREFLIGHT_REQUIRED_ORIGINS: "https://knoledgr.com,https://www.knoledgr.com,https://recall-three-plum.vercel.app"

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Tests
      working-directory: backend
      run: python manage.py test
    - name: Run Knowledge/Decision Regression Tests
      working-directory: backend
      run: |
        python manage.py test apps.knowledge.tests_api_contracts apps.knowledge.tests_cross_module_regression apps.decisions.tests_api_contracts apps.decisions.tests_workflow_permissions --settings=config.settings_test
    - name: Run Security Checks
      working-directory: backend
      run: |
        python manage.py check --deploy --fail-level WARNING
        python manage.py security_preflight --allow-pending-migrations
        python manage.py test apps.integrations.tests_security config.tests_security apps.users.tests_bot_protection
